name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Lint, OpenAPI drift, contract, tests, and build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 4070
      DATABASE_URL: postgresql://taskbricks:taskbricks@localhost:5432/taskbricks_ci?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-for-taskbricks-tests-123456
      JWT_REFRESH_SECRET: ci-refresh-secret-for-taskbricks-tests-123456
    defaults:
      run:
        working-directory: taskbricks-be

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: taskbricks-be

      - name: Checkout frontend contract target
        uses: actions/checkout@v4
        with:
          repository: KRISSBAJO/taskBrick_fe
          path: taskbricks-fe

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: taskbricks-be/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CI checks
        run: npm run ci:check
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/taskbricks_test"
